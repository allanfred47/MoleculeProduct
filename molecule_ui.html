<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MoleculeProduct — Property Predictor</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f8fafc; --surface: #ffffff; --border: #e2e8f0;
      --text: #0f172a; --muted: #64748b; --primary: #2563eb;
      --emerald: #10b981; --red: #ef4444; --radius: 12px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; gap: 12px; }
    .logo-text h1 { font-size: 14px; font-weight: 700; }
    .logo-text p  { font-size: 12px; color: var(--muted); margin-top: 3px; }
    main { max-width: 720px; margin: 0 auto; padding: 40px 24px; display: flex; flex-direction: column; gap: 20px; }
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 24px; }
    label { font-size: 13px; font-weight: 600; display: block; margin-bottom: 4px; }
    .hint { font-size: 12px; color: var(--muted); margin-bottom: 12px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1; height: 40px; border: 1px solid var(--border); border-radius: 8px;
      padding: 0 12px; font-family: 'Inter', sans-serif; font-size: 13px;
      background: var(--bg); color: var(--text); outline: none;
    }
    input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    button.predict {
      height: 40px; padding: 0 20px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
      cursor: pointer; white-space: nowrap;
    }
    button.predict:disabled { opacity: .5; cursor: default; }
    button.predict:hover:not(:disabled) { opacity: .88; }
    .examples { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; align-items: center; }
    .examples span { font-size: 12px; color: var(--muted); }
    button.pill { padding: 4px 12px; border: 1px solid var(--border); border-radius: 999px; background: transparent; font-size: 12px; cursor: pointer; }
    button.pill:hover { background: var(--bg); }
    .banner { border-radius: var(--radius); padding: 14px 16px; font-size: 13px; }
    .banner.error { background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c; }
    .skeleton { border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); padding: 24px; display: flex; flex-direction: column; gap: 14px; }
    .skel-line { height: 14px; border-radius: 6px; background: #e2e8f0; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    .ro5-badge { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 999px; font-size: 12px; font-weight: 600; border: 1px solid; }
    .ro5-badge.pass { background: #f0fdf4; border-color: #bbf7d0; color: #15803d; }
    .ro5-badge.fail { background: #fef2f2; border-color: #fecaca; color: #b91c1c; }
    .ro5-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .ro5-dot.pass { background: var(--emerald); }
    .ro5-dot.fail { background: var(--red); }
    .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .results-header h2 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .props-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
    @media(max-width:500px){ .props-grid { grid-template-columns: repeat(2,1fr); } }
    .prop-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
    .prop-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
    .prop-value { font-size: 22px; font-weight: 700; font-family: 'JetBrains Mono', monospace; line-height: 1; }
    .prop-unit  { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .lipinski-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; }
    .lipinski-card h3 { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 16px; }
    .bar-row { margin-bottom: 14px; }
    .bar-row:last-child { margin-bottom: 0; }
    .bar-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
    .bar-val.good { color: #059669; font-weight: 600; }
    .bar-val.bad  { color: var(--red); font-weight: 600; }
    .bar-track { height: 6px; border-radius: 99px; background: #e2e8f0; overflow: hidden; }
    .bar-fill  { height: 100%; border-radius: 99px; transition: width .7s ease; }
    .bar-fill.good { background: var(--emerald); }
    .bar-fill.bad  { background: var(--red); }
    .smiles-echo { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 16px; display: flex; align-items: center; gap: 12px; font-size: 13px; margin-top: 12px; }
    .echo-label { color: var(--muted); font-size: 12px; white-space: nowrap; }
    .echo-val   { font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>

<header>
  <svg viewBox="0 0 32 32" width="32" height="32" fill="none">
    <circle cx="16" cy="16" r="5" stroke="#2563eb" stroke-width="2.5"/>
    <circle cx="4"  cy="8"  r="3" stroke="#2563eb" stroke-width="2"/>
    <circle cx="28" cy="8"  r="3" stroke="#2563eb" stroke-width="2"/>
    <circle cx="4"  cy="24" r="3" stroke="#059669" stroke-width="2"/>
    <circle cx="28" cy="24" r="3" stroke="#059669" stroke-width="2"/>
    <line x1="7"  y1="9.5"  x2="12" y2="13"  stroke="#2563eb" stroke-width="1.5"/>
    <line x1="25" y1="9.5"  x2="20" y2="13"  stroke="#2563eb" stroke-width="1.5"/>
    <line x1="7"  y1="22.5" x2="12" y2="19"  stroke="#059669" stroke-width="1.5"/>
    <line x1="25" y1="22.5" x2="20" y2="19"  stroke="#059669" stroke-width="1.5"/>
  </svg>
  <div class="logo-text">
    <h1>MoleculeProduct</h1>
    <p>Molecular Property Predictor</p>
  </div>
</header>

<main>
  <div class="card">
    <label for="smiles-input">Molecule Name or SMILES</label>
    <p class="hint">Type any molecule name (e.g. morphine, testosterone, ibuprofen) or a SMILES string.</p>
    <div class="input-row">
      <input id="smiles-input" type="text" placeholder="e.g. benzene or CCO" autocomplete="off" />
      <button class="predict" id="predict-btn" onclick="runPredict()">Predict</button>
    </div>
    <div class="examples">
      <span>Examples:</span>
      <button class="pill" onclick="predict('CCO')">Ethanol</button>
      <button class="pill" onclick="predict('CC(=O)Oc1ccccc1C(=O)O')">Aspirin</button>
      <button class="pill" onclick="predict('Cn1cnc2c1c(=O)n(c(=O)n2C)C')">Caffeine</button>
      <button class="pill" onclick="predict('CC(=O)Nc1ccc(O)cc1')">Paracetamol</button>
      <button class="pill" onclick="predict('c1ccccc1')">Benzene</button>
      <button class="pill" onclick="predict('OC[C@H]1OC(O)[C@H](O)[C@@H](O)[C@@H]1O')">Glucose</button>
    </div>
  </div>

  <div id="error-banner" class="banner error" style="display:none"></div>

  <div id="skeleton" class="skeleton" style="display:none">
    <div class="skel-line" style="width:55%"></div>
    <div class="skel-line" style="width:75%"></div>
    <div class="skel-line" style="width:40%"></div>
    <div class="skel-line" style="width:65%"></div>
  </div>

  <div id="results" style="display:none">
    <div id="invalid-banner" class="banner error" style="display:none">
      <strong>Not found.</strong> This name was not recognised. Try a different name or paste a SMILES string.
    </div>
    <div id="valid-results" style="display:none">
      <div class="results-header">
        <h2>Results</h2>
        <div id="ro5-badge" class="ro5-badge"></div>
      </div>
      <div class="props-grid" id="props-grid"></div>
      <div class="lipinski-card" style="margin-top:12px">
        <h3>Lipinski Rule of 5</h3>
        <div id="lipinski-bars"></div>
      </div>
      <div class="smiles-echo">
        <span class="echo-label">SMILES</span>
        <span class="echo-val" id="smiles-echo"></span>
      </div>
    </div>
  </div>
</main>

<script>
  const API = "http://localhost:8000";

  function predict(smiles) {
    document.getElementById("smiles-input").value = smiles;
    sendToAPI(smiles);
  }

  async function runPredict() {
    const raw = document.getElementById("smiles-input").value.trim();
    if (!raw) return;

    document.getElementById("error-banner").style.display = "none";
    document.getElementById("results").style.display = "none";
    document.getElementById("skeleton").style.display = "flex";
    document.getElementById("predict-btn").disabled = true;
    document.getElementById("predict-btn").textContent = "Looking up…";

    let smiles = raw;
    try {
      const resp = await fetch(`${API}/lookup?name=${encodeURIComponent(raw)}`);
      const json = await resp.json();
      if (json.smiles) smiles = json.smiles;
    } catch {}

    await sendToAPI(smiles);
  }

  async function sendToAPI(smiles) {
    document.getElementById("error-banner").style.display = "none";
    document.getElementById("results").style.display = "none";
    document.getElementById("skeleton").style.display = "flex";
    document.getElementById("predict-btn").disabled = true;
    document.getElementById("predict-btn").textContent = "Analysing…";

    try {
      const res = await fetch(API + "/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ smiles })
      });
      if (!res.ok) throw new Error("Server error");
      const data = await res.json();
      showResults(data);
    } catch (e) {
      document.getElementById("skeleton").style.display = "none";
      const eb = document.getElementById("error-banner");
      eb.textContent = "Could not connect to the API. Make sure your FastAPI server is running.";
      eb.style.display = "block";
    } finally {
      document.getElementById("predict-btn").disabled = false;
      document.getElementById("predict-btn").textContent = "Predict";
    }
  }

  function showResults(data) {
    document.getElementById("skeleton").style.display = "none";
    document.getElementById("results").style.display = "block";
    if (!data.valid) {
      document.getElementById("invalid-banner").style.display = "block";
      document.getElementById("valid-results").style.display = "none";
      return;
    }
    document.getElementById("invalid-banner").style.display = "none";
    document.getElementById("valid-results").style.display = "block";

    const violations = [];
    if (data.molecular_weight > 500) violations.push("MW > 500");
    if (data.logp > 5)               violations.push("LogP > 5");
    if (data.hbd > 5)                violations.push("HBD > 5");
    if (data.hba > 10)               violations.push("HBA > 10");
    const pass = violations.length === 0;
    const badge = document.getElementById("ro5-badge");
    badge.className = "ro5-badge " + (pass ? "pass" : "fail");
    badge.innerHTML = `<span class="ro5-dot ${pass?'pass':'fail'}"></span>
      ${pass ? "Passes Lipinski Rule of 5" : "Fails Rule of 5: " + violations.join(", ")}`;

    const props = [
      { label: "Molecular Weight", value: data.molecular_weight, unit: "Da", dp: 3 },
      { label: "LogP",             value: data.logp,             unit: "",   dp: 4 },
      { label: "TPSA",             value: data.tpsa,             unit: "Å²",dp: 2 },
      { label: "H-Bond Donors",    value: data.hbd,              unit: "",   dp: 0 },
      { label: "H-Bond Acceptors", value: data.hba,              unit: "",   dp: 0 },
      { label: "Rotatable Bonds",  value: data.rotatable_bonds,  unit: "",   dp: 0 },
    ];
    document.getElementById("props-grid").innerHTML = props.map(p => `
      <div class="prop-card">
        <div class="prop-label">${p.label}</div>
        <div class="prop-value">${p.dp===0 ? p.value : Number(p.value).toFixed(p.dp)}</div>
        ${p.unit ? `<div class="prop-unit">${p.unit}</div>` : ""}
      </div>`).join("");

    const bars = [
      { label: "Molecular Weight", value: data.molecular_weight, max: 500, limit: "≤ 500 Da" },
      { label: "LogP",             value: data.logp,             max: 5,   limit: "≤ 5"      },
      { label: "H-Bond Donors",    value: data.hbd,              max: 5,   limit: "≤ 5"      },
      { label: "H-Bond Acceptors", value: data.hba,              max: 10,  limit: "≤ 10"     },
    ];
    document.getElementById("lipinski-bars").innerHTML = bars.map(b => {
      const pct = Math.min((b.value / b.max) * 100, 100);
      const good = b.value <= b.max;
      return `<div class="bar-row">
        <div class="bar-meta">
          <span>${b.label} (${b.limit})</span>
          <span class="bar-val ${good?'good':'bad'}">${Number(b.value).toFixed(2)}</span>
        </div>
        <div class="bar-track">
          <div class="bar-fill ${good?'good':'bad'}" style="width:${pct}%"></div>
        </div>
      </div>`;
    }).join("");

    document.getElementById("smiles-echo").textContent = data.smiles;
  }

  document.getElementById("smiles-input").addEventListener("keydown", e => {
    if (e.key === "Enter") runPredict();
  });
</script>
</body>
</html>
